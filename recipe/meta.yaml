{% set name = "angsd" %}
{% set version = "0.940" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: http://popgen.dk/software/download/angsd/angsd{{ version }}.tar.gz
  # Fill this in after downloading:
  # sha256: YOUR_SHA256_HASH

build:
  number: 0

requirements:
  build:
    - {{ compiler("c") }}
    - {{ compiler("cxx") }}
    - make
    - pkg-config

  host:
    - zlib
    - bzip2
    - xz
    - libcurl
    - openssl
    - libdeflate
    - zstd
    - llvm-openmp

  run:
    - zlib
    - bzip2
    - xz
    - libcurl
    - openssl
    - libdeflate
    - zstd
    - llvm-openmp

test:
  commands:
    - angsd 2>&1 | head -20
    - realSFS 2>&1 | head -20
    - thetaStat 2>&1 | head -20

about:
  home: https://github.com/ANGSD/angsd
  license: GPL-3.0-or-later
  summary: "Analysis of Next Generation Sequencing Data"
  description: |
    ANGSD is a software package for analysing next generation sequencing
    data, including genotype likelihood estimation and population genetic
    analyses.

extra:
  recipe-maintainers:
    - YOUR_GITHUB_USERNAME
